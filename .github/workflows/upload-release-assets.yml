name: Upload release assets

on:
  release:
    types: [published]

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload .pkg (if exists)
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/Elyra\ Installer/Elyra\ Installer.pkg
          asset_name: Elyra-Installer.pkg
          asset_content_type: application/octet-stream

      - name: Upload .AppImage (if exists)
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/Elyra-Installer-x86_64.AppImage
          asset_name: Elyra-Installer-x86_64.AppImage
          asset_content_type: application/octet-stream

      - name: Upload .deb (if exists)
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/elyra-installer_1.0.0_amd64.deb
          asset_name: elyra-installer_1.0.0_amd64.deb
          asset_content_type: application/vnd.debian.binary-package
